services:
  - type: web
    name: parentshopee-api
    runtime: python
    rootDir: backend
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: parentshopee-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://rewardurkids.com
      # Required to actually send emails (activation links, Contact Us tickets).
      # Without these, the backend just logs the email content to server logs
      # instead of sending it. Set the real values in the Render dashboard —
      # never commit real credentials here.
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

databases:
  - name: parentshopee-db
    databaseName: parentshopee
    plan: free
