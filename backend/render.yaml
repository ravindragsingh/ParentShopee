services:
  - type: web
    name: parentshopee-api
    runtime: python
    rootDir: backend
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: parentshopee-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://parentshopee.vercel.app

databases:
  - name: parentshopee-db
    databaseName: parentshopee
    plan: free
